<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Embedded Mode - ContextForge Embedded</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #e94560;
    }
    header .info {
      font-size: 12px;
      color: #888;
    }
    .toolbar {
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      padding: 6px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      font-size: 13px;
    }
    .toolbar label { color: #aaa; }
    .toolbar input {
      background: #1a1a2e;
      border: 1px solid #0f3460;
      color: #e0e0e0;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 13px;
      width: 420px;
    }
    .toolbar button {
      background: #e94560;
      color: white;
      border: none;
      padding: 5px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    .toolbar button:hover { background: #c73a52; }
    .iframe-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    .status {
      background: #16213e;
      border-top: 1px solid #0f3460;
      padding: 4px 16px;
      font-size: 11px;
      color: #666;
      flex-shrink: 0;
    }
    .status .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #e94560;
      margin-right: 6px;
      vertical-align: middle;
    }
    .status .dot.connected { background: #4caf50; }
  </style>
</head>
<body>
  <header>
    <h1>Embedded Mode</h1>
    <span class="info">ContextForge Embedded UI Test Harness</span>
  </header>
  <div class="toolbar">
    <label for="url">URL:</label>
    <input type="text" id="url" value="http://localhost:8080/admin/">
    <button onclick="loadUrl()">Load</button>
    <button onclick="loadUrl('http://localhost:8080/admin/')">Reset</button>
  </div>
  <div class="iframe-container">
    <iframe id="cf-iframe" src="http://localhost:8080/admin/"></iframe>
  </div>
  <div class="status">
    <span class="dot" id="status-dot"></span>
    <span id="status-text">Loading...</span>
  </div>

  <script>
    const iframe = document.getElementById('cf-iframe');
    const dot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    const urlInput = document.getElementById('url');

    function loadUrl(url) {
      const target = url || urlInput.value.trim();
      if (!target) return;
      urlInput.value = target;
      iframe.src = target;
      dot.className = 'dot';
      statusText.textContent = 'Loading...';
    }

    iframe.addEventListener('load', () => {
      dot.className = 'dot connected';
      statusText.textContent = 'Connected — ' + urlInput.value;
    });

    iframe.addEventListener('error', () => {
      dot.className = 'dot';
      statusText.textContent = 'Failed to load iframe content';
    });
  </script>
</body>
</html>
