description: "Guard tool outputs by length with block or truncate strategies. Supports MCP content arrays, recursive structuredContent processing, numeric string preservation, blocking for structured content, word-boundary truncation, and token-based budgets with customizable estimation. Clear segregation between character and token modes."
author: "Mihai Criveti"
version: "1.0.0"
available_hooks:
  - "tool_post_invoke"
default_configs:
  # Output limits
  min_chars: 0
  max_chars: 15000
  min_tokens: 0
  max_tokens: null
  chars_per_token: 4

  # Behavior
  limit_mode: "character"
  strategy: "truncate"
  ellipsis: "…"
  word_boundary: false

  # Security limits
  max_text_length: 1000000
  max_structure_size: 10000
  max_recursion_depth: 100
supported_formats:
  - "str"
  - "dict with text field"
  - "list of strings"
  - "MCP content array: [{type: 'text', text: '...'}]"
  - "structuredContent: recursive processing of nested lists and dicts"
