# ===============================================================
# 🧪 JavaScript Unit Tests (Vitest)
# ===============================================================
# Authors: Gabriel Costa, Mihai Criveti
#   - runs Vitest unit tests for browser-side JavaScript
#   - uses jsdom environment to test non-modular browser scripts
#   - installs dependencies from package.json / package-lock.json
# ---------------------------------------------------------------

name: JavaScript Tests (Vitest)

on:
  push:
    branches: ["main"]
    paths:
      - "mcpgateway/static/**"
      - "tests/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/vitest.yml"
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches: ["main"]
    paths:
      - "mcpgateway/static/**"
      - "tests/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/vitest.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  vitest:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    name: vitest
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # -----------------------------------------------------------
      # 0️⃣  Checkout
      # -----------------------------------------------------------
      - name: ⬇️  Checkout source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
          fetch-depth: 1

      # -----------------------------------------------------------
      # 1️⃣  Node.js Setup
      # -----------------------------------------------------------
      - name: 📦  Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '20'
          cache: npm

      # -----------------------------------------------------------
      # 2️⃣  Install Dependencies
      # -----------------------------------------------------------
      - name: 📥  Install dependencies
        run: npm ci

      # -----------------------------------------------------------
      # 3️⃣  Run Vitest
      # -----------------------------------------------------------
      - name: 🧪  Run Vitest
        run: npx vitest run
